 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffc3a0,#ffafbd);
overflow:hidden;
}

.container{
width:90%;
max-width:600px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
color:white;
margin-bottom:20px;
font-size:35px;
}

#letter{
color:white;
font-size:18px;
line-height:1.8;
min-height:220px;
text-align:left;
white-space:pre-line;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:18px;
font-weight:bold;
cursor:pointer;
display:none;
}

button:hover{
transform:scale(1.05);
}

.heart{
position:absolute;
color:white;
font-size:22px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">

<h1>I'm Sorry ❤️</h1>

<div id="letter"></div>

<button onclick="nextPage()">I Understand ❤️</button>

</div>

<script>

const message=`My Love,

I know I made mistakes.

I know I hurt your feelings, and that is something I truly regret.

If I could go back in time, I would change those moments.

You deserve love, respect, and happiness.

I'm sincerely sorry.

Please keep reading...
❤️`;

let i=0;

function type(){

if(i<message.length){

document.getElementById("letter").innerHTML+=message.charAt(i);

i++;

setTimeout(type,45);

}else{

document.querySelector("button").style.display="inline-block";

}

}

type();

function nextPage(){

window.location.href="page5.html";

}

function heart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},8000);

}

setInterval(heart,400);

</script>

</body>
  </html>
