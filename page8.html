<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Us ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5,#ffe29f);
text-align:center;
}

.container{
background:rgba(255,255,255,.18);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
width:90%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
z-index:10;
}

h1{
color:white;
font-size:40px;
margin-bottom:20px;
}

p{
color:white;
font-size:18px;
line-height:1.8;
margin-bottom:25px;
}

img{
width:180px;
height:180px;
border-radius:50%;
border:5px solid white;
object-fit:cover;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,255,255,.5);
}

.heart,.confetti{
position:absolute;
pointer-events:none;
}

.heart{
font-size:22px;
animation:heartFloat 6s linear infinite;
}

.confetti{
width:8px;
height:8px;
background:white;
animation:confettiFall 5s linear infinite;
}

@keyframes heartFloat{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.2);
opacity:0;
}
}

@keyframes confettiFall{
0%{
transform:translateY(-20px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}
</style>

</head>

<body>

<div class="container">

<img src="OurPhoto.jpg" alt="Our Photo">

<h1>I Love You ❤️</h1>

<p>

Thank you for taking this little journey with me.

I know I made mistakes...

But my love for you has never changed.

I hope we can create many more beautiful memories together.

No matter what happens,

I'll always choose you.

Forever. ❤️

</p>

<h2 style="color:white;">The End... or Our New Beginning? 🌹</h2>

</div>

<script>

function heart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*25)+"px";

h.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},7000);

}

setInterval(heart,250);

function confetti(){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background="hsl("+Math.random()*360+",100%,70%)";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},5000);

}

setInterval(confetti,120);

</script>

</body>
</html>
