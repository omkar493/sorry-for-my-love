<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Minute ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#ff9a9e,#fbc2eb,#fad0c4,#ffd1dc);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h1{
color:white;
font-size:34px;
margin-bottom:20px;
min-height:45px;
}

p{
color:white;
font-size:18px;
line-height:1.7;
margin-bottom:35px;
}

.buttons{
position:relative;
height:120px;
}

button{
padding:14px 28px;
border:none;
border-radius:30px;
font-size:17px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

#yes{
background:white;
color:#ff4d6d;
}

#yes:hover{
transform:scale(1.08);
}

#no{
position:absolute;
left:220px;
top:0;
background:#ff4d6d;
color:white;
}

.heart{
position:absolute;
font-size:20px;
color:white;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{opacity:1;}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card">

<h1 id="typing"></h1>

<p>
Before you decide anything...<br><br>
Please give me just one minute.<br>
I made this with all my heart because you mean the world to me. ❤️
</p>

<div class="buttons">
<button id="yes" onclick="nextPage()">Okay ❤️</button>
<button id="no">No 🙈</button>
</div>

</div>

<script>

const text="Hi My Love ❤️";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,100);
}
}
type();

function nextPage(){
window.location.href="page3.html";
}

const no=document.getElementById("no");

function moveButton(){

const x=Math.random()*220;
const y=Math.random()*80;

no.style.left=x+"px";
no.style.top=y+"px";

}

no.addEventListener("mouseenter",moveButton);
no.addEventListener("touchstart",moveButton);

function heart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},8000);

}

setInterval(heart,400);

</script>

</body>
</html>
