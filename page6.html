<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
overflow:hidden;
}

.container{
text-align:center;
padding:30px;
}

h1{
color:white;
margin-bottom:30px;
font-size:35px;
}

.gift{
font-size:120px;
cursor:pointer;
transition:.5s;
}

.gift:hover{
transform:scale(1.15) rotate(10deg);
}

#message{
display:none;
margin-top:25px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
color:white;
font-size:20px;
line-height:1.8;
max-width:420px;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:18px;
font-weight:bold;
cursor:pointer;
display:none;
}

.heart{
position:absolute;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<h1>A Little Surprise For You 🎁</h1>

<div class="gift" onclick="openGift()">
🎁
</div>

<div id="message">

💖 Surprise! 💖

You are the best thing that has ever happened to me.

No matter what happens...

My heart will always choose you.

Thank you for being part of my life. ❤️

</div>

<button id="next" onclick="nextPage()">
Continue ❤️
</button>

</div>

<script>

function openGift(){

document.querySelector(".gift").innerHTML="💝";

document.getElementById("message").style.display="block";

document.getElementById("next").style.display="inline-block";

for(let i=0;i<40;i++){

setTimeout(createHeart,i*100);

}

}

function nextPage(){

window.location.href="page7.html";

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*25)+"px";

heart.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},7000);

}

</script>

</body>
</html>
