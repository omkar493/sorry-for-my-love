<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Forgive Me? ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
overflow:hidden;
}

.card{
width:90%;
max-width:430px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.2);
}

.teddy{
font-size:100px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

h1{
color:white;
margin:20px 0;
}

p{
color:white;
font-size:18px;
line-height:1.7;
margin-bottom:30px;
}

.buttons{
position:relative;
height:120px;
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

#yes{
background:white;
color:#ff4d6d;
}

#yes:hover{
transform:scale(1.1);
}

#no{
position:absolute;
left:220px;
top:0;
background:#ff4d6d;
color:white;
}

.heart{
position:absolute;
font-size:22px;
animation:float 7s linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

</style>

</head>

<body>

<div class="card">

<div class="teddy">🧸❤️</div>

<h1>Will You Forgive Me?</h1>

<p>

I know I made mistakes...

But my love for you is real.

Can we start again together? ❤️

</p>

<div class="buttons">

<button id="yes" onclick="nextPage()">

Yes ❤️

</button>

<button id="no">

No 🙈

</button>

</div>

</div>

<script>

function nextPage(){

window.location.href="page8.html";

}

const no=document.getElementById("no");

function move(){

const x=Math.random()*220;

const y=Math.random()*70;

no.style.left=x+"px";

no.style.top=y+"px";

}

no.addEventListener("mouseenter",move);

no.addEventListener("touchstart",move);

function heart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*20)+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},7000);

}

setInterval(heart,350);

</script>

</body>
</html>
